
version: '3.1'

services:
    postgres:
        image: postgres
        volumes:
            - ../pgdb/:/var/lib/postgresql/data/
        ports:
            - "5432:5432"
        env_file: ../.env
        environment:
            - LC_ALL=C.UTF-8

    adminer:
      image: adminer
      restart: always
      ports:
        - 8080:8080 
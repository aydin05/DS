<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Digital Signage Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #player-video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            background: #000;
        }
        #status-dot {
            display: none;
            position: absolute;
            top: 16px;
            right: 16px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ef4444;
            z-index: 10;
        }
        #waiting-msg {
            color: #fff;
            text-align: center;
            padding-top: 20%;
            font-size: 18px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div id="status-dot"></div>
    <video id="player-video" autoplay muted playsinline style="display:none;"></video>
    <div id="waiting-msg">Loading...</div>

    <script>
        // --- Register Service Worker for offline caching ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/newds/sw.js').then(function(reg) {
                console.log('[SW] Registered, scope:', reg.scope);
            }).catch(function(err) {
                console.warn('[SW] Registration failed:', err.message);
            });
        }

        // --- Pre-cache video for offline use (full fetch, no Range header) ---
        var VIDEO_CACHE_NAME = 'ds-openlink-v2';
        function preCacheVideo(url) {
            if (!('caches' in window)) return;
            caches.open(VIDEO_CACHE_NAME).then(function(cache) {
                cache.match(url).then(function(existing) {
                    if (existing && existing.status === 200) {
                        videoCached = true;
                        console.log('[Cache] Video already cached');
                        return;
                    }
                    // Fetch full video (no Range header) — goes to network
                    fetch(url, { cache: 'no-cache' }).then(function(resp) {
                        if (resp.ok && resp.status === 200) {
                            cache.put(url, resp).then(function() {
                                videoCached = true;
                                console.log('[Cache] Video pre-cached OK, size:', resp.headers.get('content-length'));
                                addLog('INFO', 'Video pre-cached for offline', { url: url, size: resp.headers.get('content-length') });
                            });
                        } else {
                            console.warn('[Cache] Unexpected response status:', resp.status);
                            addLog('WARN', 'Pre-cache unexpected status', { status: resp.status, url: url });
                        }
                    }).catch(function(e) {
                        console.warn('[Cache] Pre-cache fetch failed:', e.message);
                        addLog('WARN', 'Pre-cache fetch failed', { error: e.message });
                    });
                }).catch(function() {});
            }).catch(function() {});
        }

        // Check if a URL is in the cache (returns via callback)
        function isVideoInCache(url, cb) {
            if (!('caches' in window)) return cb(false);
            caches.open(VIDEO_CACHE_NAME).then(function(cache) {
                cache.match(url).then(function(r) { cb(!!r); }).catch(function() { cb(false); });
            }).catch(function() { cb(false); });
        }

        // --- Configuration ---
        var API_BASE = '/newds/api/v1/';
        var FETCH_INTERVAL = 30000;
        var HEARTBEAT_INTERVAL = 30000;
        // Detect source: Tizen TV vs regular browser (open-link on PC)
        var HEARTBEAT_SOURCE = (navigator.userAgent.indexOf('Tizen') !== -1) ? 'tizen' : 'openlink';
        // Detect Tizen 4 (single video decoder, loop attribute broken)
        var IS_TIZEN4 = (navigator.userAgent.indexOf('Tizen 4') !== -1);

        // --- Get username from URL ---
        var params = {};
        var search = window.location.search.substring(1);
        if (search) {
            var parts = search.split('&');
            for (var i = 0; i < parts.length; i++) {
                var kv = parts[i].split('=');
                params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
            }
        }
        // Also support path-based: /tv-player.html/portrait or hash: #portrait
        var username = params.username || window.location.hash.substring(1) || '';
        var MODE = params.mode || '';
        if (!username) {
            document.getElementById('waiting-msg').innerText = 'Error: No username specified. Use ?username=YOUR_DISPLAY_NAME';
        }

        // --- State ---
        var currentVideoUrl = null;
        var apiReachable = true;
        var fetchIntervalId = null;
        var heartbeatIntervalId = null;
        var videoCached = false;

        // --- Cached video URL (offline fallback) ---
        var LS_KEY = 'ds_tv_video_' + username;
        var LS_SIZE_KEY = 'ds_tv_size_' + username;
        try {
            currentVideoUrl = localStorage.getItem(LS_KEY) || null;
            if (currentVideoUrl && MODE !== 'tizen') {
                showVideo(currentVideoUrl);
            } else if (currentVideoUrl && MODE === 'tizen') {
                // Send cached URL to parent on startup (force HTTP for Tizen compatibility)
                var a = document.createElement('a'); a.href = currentVideoUrl;
                var safeUrl = a.href.replace(/^https:/, 'http:');
                try { window.parent.postMessage({ type: 'ds-video-url', url: safeUrl }, '*'); } catch(e) {}
            }
        } catch(e) {}

        // --- Fetch display data ---
        function fetchData() {
            if (!username) return;
            var xhr = new XMLHttpRequest();
            xhr.open('GET', API_BASE + 'display/display-detail?username=' + encodeURIComponent(username), true);
            xhr.timeout = 15000;
            xhr.onload = function() {
                if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        apiReachable = true;
                        updateStatusDot();

                        var newUrl = data.merged_video_url || null;
                        if (newUrl && newUrl !== currentVideoUrl) {
                            currentVideoUrl = newUrl;
                            try { localStorage.setItem(LS_KEY, newUrl); } catch(e) {}
                            addLog('INFO', 'New video URL', { url: newUrl });
                            if (MODE === 'tizen') {
                                // Resolve to full URL and send to parent widget for download
                                // Force HTTP — Tizen 4 may not trust HTTPS certs
                                var a = document.createElement('a'); a.href = newUrl;
                                var safeUrl = a.href.replace(/^https:/, 'http:');
                                try { window.parent.postMessage({ type: 'ds-video-url', url: safeUrl }, '*'); } catch(e) {}
                            } else {
                                showVideo(newUrl);
                            }
                        } else if (!newUrl && !currentVideoUrl) {
                            document.getElementById('waiting-msg').style.display = 'block';
                            document.getElementById('waiting-msg').innerText = 'Waiting for video content...';
                            document.getElementById('player-video').style.display = 'none';
                        }

                        // Cache display size
                        if (data.general) {
                            try {
                                localStorage.setItem(LS_SIZE_KEY, JSON.stringify({
                                    width: data.general.width,
                                    height: data.general.height
                                }));
                            } catch(e) {}
                            applyDisplaySize(data.general.width, data.general.height);
                        }
                    } catch(e) {
                        console.error('Parse error:', e);
                    }
                } else {
                    console.error('API error:', xhr.status, xhr.statusText);
                    apiReachable = false;
                    updateStatusDot();
                }
            };
            xhr.onerror = function() {
                apiReachable = false;
                updateStatusDot();
                addLog('ERROR', 'API fetch error (network)');
            };
            xhr.ontimeout = function() {
                apiReachable = false;
                updateStatusDot();
                addLog('ERROR', 'API fetch timeout');
            };
            xhr.send();
        }

        function showVideo(url) {
            var video = document.getElementById('player-video');
            document.getElementById('waiting-msg').style.display = 'none';
            video.style.display = 'block';
            if (!IS_TIZEN4) {
                video.loop = true;
            }
            if (video.src !== url) {
                video.src = url;
                video.load();
                try { video.play(); } catch(e) {}
            }
            // Pre-cache full video for offline playback
            preCacheVideo(url);
            // Send resolved URL to parent widget for offline caching
            try { window.parent.postMessage({ type: 'ds-video-url', url: video.src }, '*'); } catch(e) {}
        }

        // Tizen 4: loop and seeking broken on hardware decoder.
        // Restart via load() on ended. Offline: retry from SW cache with backoff.
        if (IS_TIZEN4) {
            var vid = document.getElementById('player-video');
            var _offlineRetries = 0;
            var _maxRetries = 10;
            var _retryTimer = null;

            function t4Restart() {
                console.log('[T4] restart, offline=' + !navigator.onLine + ', cached=' + videoCached);
                vid.load();
                try { vid.play(); } catch(e) {}
            }

            // Normal ended → restart (loop workaround)
            vid.addEventListener('ended', function() {
                _offlineRetries = 0;
                t4Restart();
            });

            // Error handler — critical for offline recovery
            vid.addEventListener('error', function() {
                var errMsg = vid.error ? vid.error.message || vid.error.code : 'unknown';
                console.error('[T4] Video error:', errMsg);
                addLog('ERROR', 'Video error', { error: errMsg, online: navigator.onLine, cached: videoCached });

                if (_retryTimer) clearTimeout(_retryTimer);

                // If online, just retry once quickly
                if (navigator.onLine && apiReachable) {
                    _retryTimer = setTimeout(t4Restart, 2000);
                    return;
                }

                // Offline — check cache and retry with backoff
                _offlineRetries++;
                if (_offlineRetries > _maxRetries) {
                    addLog('ERROR', 'Max offline retries reached');
                    return;
                }

                var delay = Math.min(_offlineRetries * 2000, 10000);
                isVideoInCache(vid.src, function(inCache) {
                    if (inCache) {
                        addLog('INFO', 'Cache hit, retry #' + _offlineRetries + ' in ' + delay + 'ms');
                        _retryTimer = setTimeout(t4Restart, delay);
                    } else {
                        addLog('WARN', 'Video NOT in cache, cannot play offline');
                        document.getElementById('waiting-msg').innerText = 'Offline — video not cached';
                        document.getElementById('waiting-msg').style.display = 'block';
                    }
                });
            });

            // Safety: stall + error state detection every 1s
            var _t4Last = -1, _t4Stall = 0;
            setInterval(function() {
                if (!vid.src) return;
                // If in error state (duration is NaN), let the error handler deal with it
                if (vid.error) return;
                if (!vid.duration || isNaN(vid.duration)) return;
                if (vid.currentTime === _t4Last && vid.currentTime > 0) {
                    _t4Stall++;
                    if (_t4Stall >= 3) {
                        addLog('WARN', 'Stall detected at ' + vid.currentTime);
                        t4Restart();
                        _t4Stall = 0;
                        _t4Last = -1;
                    }
                } else { _t4Stall = 0; }
                _t4Last = vid.currentTime;
            }, 1000);
        }

        function applyDisplaySize(w, h) {
            if (w && h) {
                var video = document.getElementById('player-video');
                video.style.width = w + 'px';
                video.style.height = h + 'px';
                video.style.margin = '0 auto';
            }
        }

        function updateStatusDot() {
            var dot = document.getElementById('status-dot');
            dot.style.display = (!apiReachable || !navigator.onLine) ? 'block' : 'none';
        }

        // --- Logging ---
        var logBuffer = [];
        function addLog(level, message, data) {
            if (logBuffer.length >= 50) logBuffer.shift();
            logBuffer.push({
                timestamp: new Date().toISOString(),
                level: level,
                message: message,
                data: data || {}
            });
        }
        function flushLogs() {
            if (!username || logBuffer.length === 0) return;
            var batch = logBuffer.splice(0, logBuffer.length);
            var xhr = new XMLHttpRequest();
            xhr.open('POST', API_BASE + 'core/device-logs/', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.timeout = 10000;
            xhr.send(JSON.stringify({
                username: username,
                source: HEARTBEAT_SOURCE,
                logs: batch
            }));
        }

        // --- Heartbeat ---
        function sendHeartbeat() {
            if (!username) return;
            var xhr = new XMLHttpRequest();
            xhr.open('POST', API_BASE + 'core/heartbeat/', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify({ username: username, source: HEARTBEAT_SOURCE }));
            flushLogs();
        }

        // --- Sign out (press 0 on remote) ---
        function signOut() {
            // Stop all intervals so heartbeat stops → device becomes inactive
            if (fetchIntervalId) clearInterval(fetchIntervalId);
            if (heartbeatIntervalId) clearInterval(heartbeatIntervalId);

            // Stop video
            try {
                var video = document.getElementById('player-video');
                video.pause();
                video.src = '';
            } catch(e) {}

            // Clear saved URL so widget shows settings instead of auto-connecting
            try { localStorage.removeItem('ds_last_url'); } catch(e) {}

            // Navigate back to widget settings page
            history.back();
        }

        // Listen for "0" key on remote (keyCode 48)
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 48) {
                e.preventDefault();
                signOut();
            }
        });

        // --- Online/Offline detection ---
        window.addEventListener('online', function() {
            addLog('INFO', 'Network online');
            updateStatusDot();
            fetchData();
        });
        window.addEventListener('offline', function() {
            addLog('WARN', 'Network offline');
            updateStatusDot();
        });

        // --- Start ---
        if (username) {
            // Apply cached display size
            try {
                var cachedSize = JSON.parse(localStorage.getItem(LS_SIZE_KEY));
                if (cachedSize) applyDisplaySize(cachedSize.width, cachedSize.height);
            } catch(e) {}

            // Log startup
            addLog('INFO', 'Player started', { mode: MODE || 'default', source: HEARTBEAT_SOURCE, ua: navigator.userAgent.substring(0, 100) });

            // Initial fetch
            fetchData();
            sendHeartbeat();

            // Periodic refresh
            fetchIntervalId = setInterval(fetchData, FETCH_INTERVAL);
            heartbeatIntervalId = setInterval(sendHeartbeat, HEARTBEAT_INTERVAL);

            // In tizen mode, report connectivity to parent widget for red dot
            if (MODE === 'tizen') {
                setInterval(function() {
                    try { window.parent.postMessage({ type: 'ds-connectivity', online: apiReachable }, '*'); } catch(e) {}
                }, 5000);
            }
        }
    </script>
</body>
</html>

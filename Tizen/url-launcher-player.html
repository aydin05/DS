<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: -apple-system, sans-serif; color: #fff; overflow: hidden; }

        /* Credential Page */
        #cred-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f1117, #1a1d2e);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .cred-box {
            background: #1c1f2e; border: 1px solid #2d3148; border-radius: 16px;
            padding: 50px; width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .cred-box h2 { text-align: center; margin-bottom: 8px; font-size: 22px; }
        .cred-box p { text-align: center; color: #8b8fa3; font-size: 13px; margin-bottom: 30px; }
        .cred-box label { display: block; font-size: 12px; color: #8b8fa3; margin-bottom: 6px; margin-top: 16px; }
        .cred-box input {
            width: 100%; padding: 12px 14px; background: #252838; border: 1px solid #2d3148;
            border-radius: 8px; color: #e1e4e8; font-size: 14px; outline: none;
        }
        .cred-box input:focus { border-color: #4f8cff; }
        .cred-box button {
            width: 100%; padding: 14px; margin-top: 24px;
            background: linear-gradient(135deg, #4f8cff, #6c5ce7); border: none;
            border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
        }
        .cred-box button:disabled { opacity: 0.5; }
        #cred-error { color: #ff4757; font-size: 13px; margin-top: 12px; display: none; }

        /* Player Area */
        #player-wrap {
            position: relative; width: 100vw; height: 100vh; background: #000;
        }
        #content-wrap {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 500;
        }
        .loader { width: 40px; height: 40px; border: 3px solid #2d3148; border-top-color: #4f8cff;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading_text { color: #8b8fa3; font-size: 14px; }

        /* Offline indicator */
        #offline-indicator {
            position: fixed; top: 20px; right: 20px; width: 16px; height: 16px;
            border-radius: 50%; background: red; display: none; z-index: 999;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }

        table { border-spacing: 0; margin: auto; border-collapse: collapse; }
        table th p { line-height: 42px; padding: 24px 100px; }
        table td p { line-height: 32px; padding-top: 11px; padding-bottom: 11px; }
    </style>
</head>
<body>
    <!-- Credential Page -->
    <div id="cred-page">
        <div class="cred-box">
            <h2>Digital Signage Player</h2>
            <p>Enter display credentials to start</p>
            <label>Server URL</label>
            <input type="text" id="server" value="https://aydin.technolink.az" placeholder="http://your-server">
            <label>Display Username</label>
            <input type="text" id="username" placeholder="Display username">
            <label>Display Password</label>
            <input type="password" id="password" placeholder="Display password">
            <button id="connect-btn" onclick="connectAndPlay()">Connect & Play</button>
            <div id="cred-error"></div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loader"></div>
        <div id="loading_text">Connecting to server...</div>
    </div>

    <!-- Offline indicator -->
    <div id="offline-indicator"></div>

    <!-- Player -->
    <div id="player-wrap">
        <div id="content-wrap"></div>
    </div>

    <script>
        // Logger (console-only for URL Launcher)
        const Logger = {
            info: function(msg, data) { console.log('[INFO]', msg, data || ''); },
            warn: function(msg, data) { console.warn('[WARN]', msg, data || ''); },
            error: function(msg, data) { console.error('[ERROR]', msg, data || ''); },
        };
    </script>

    <script>
    // ==================== PLAYER CLASS (slider.js inlined) ====================
    class Player {
        constructor(slides) {
            this.slides = slides;
            this.currentSlide = 1;
            this.slidesCount = slides.length;
            this.slideItems = [];
            this.isGlobalString = false;
            this.globalSlide = [];
            this.globalSlideNum = 0;
            this.slideStartTime = 0;
            this.slideDuration = 0;
            this.animationFrameId = null;
            this.isSlidePlaying = false;
            this._lastVideoElement = null;
            this.videoElement = null;
            Logger.info("Player initialized.", { slideCount: slides.length });
        }

        stopPlayer() {
            Logger.info("Player stopping.");
            if (this.animationFrameId) {
                cancelAnimationFrame(this.animationFrameId);
                this.animationFrameId = null;
            }
            if (this.videoElement) {
                try { this.videoElement.pause(); this.videoElement.removeAttribute('src'); this.videoElement.load(); } catch (e) {}
                this.videoElement = null;
            }
            if (this._lastVideoElement) {
                try { this._lastVideoElement.pause(); this._lastVideoElement.removeAttribute('src'); this._lastVideoElement.load(); } catch (e) {}
                this._lastVideoElement = null;
            }
            this.slides = [];
            this.currentSlide = 1;
            this.isGlobalString = false;
            this.globalSlide = [];
            this.isSlidePlaying = false;
            let contentWrap = document.getElementById("content-wrap");
            if (contentWrap) contentWrap.innerHTML = "";
        }

        startPlayer() {
            Logger.info("Player starting.");
            this.processSlides();
            this.currentSlide = 1;
            this.showSlide(this.currentSlide);
        }

        processSlides() {
            let newArray = [];
            for (let i = 0; i < this.slides.length; i++) {
                let hasGlobalText = false;
                let hasOtherContent = false;
                for (let i2 = 0; i2 < this.slides[i].items.length; i2++) {
                    if (this.slides[i].items[i2].type_content === "globaltext") {
                        this.isGlobalString = true;
                        this.globalSlide = this.slides[i].items[i2];
                        hasGlobalText = true;
                    } else {
                        hasOtherContent = true;
                    }
                }
                if (hasOtherContent || !hasGlobalText) {
                    newArray.push(this.slides[i]);
                }
            }
            this.slides = newArray;
            this.slidesCount = this.slides.length;
        }

        showSlide(slideIndex) {
            if (!this.slides || this.slides.length === 0 || slideIndex > this.slides.length) return;
            if (this.animationFrameId) { cancelAnimationFrame(this.animationFrameId); this.animationFrameId = null; }
            const slideData = this.slides[slideIndex - 1];
            const slideItems = slideData.items;
            this.slideDuration = (slideData.duration || 5) * 1000;
            this.prepareNextSlideContainer(slideItems);
        }

        prepareNextSlideContainer(slideItems) {
            const currentContainer = document.getElementById("content-wrap");
            const nextContainer = document.createElement("div");
            nextContainer.id = "next-content-wrap";
            nextContainer.style.position = "absolute";
            nextContainer.style.top = "0";
            nextContainer.style.left = "0";
            nextContainer.style.width = "100%";
            nextContainer.style.height = "100%";
            nextContainer.style.opacity = "0";
            nextContainer.style.zIndex = currentContainer ? (parseInt(currentContainer.style.zIndex || "0") + 1).toString() : "1";
            if (currentContainer) {
                currentContainer.parentNode.insertBefore(nextContainer, currentContainer.nextSibling);
            } else {
                document.body.appendChild(nextContainer);
            }
            this.loadSlideContent(nextContainer, slideItems);
        }

        loadSlideContent(container, slideItems) {
            let mediaLoading = false;
            const mediaElements = [];
            if (this.isGlobalString) {
                container.appendChild(this.addTextElement(this.globalSlide));
            }
            for (const item of slideItems) {
                let element = null;
                switch (item.type_content) {
                    case "text":
                    case "globaltext":
                        element = this.addTextElement(item);
                        break;
                    case "video":
                        element = this.addVideoElement(item);
                        mediaLoading = true;
                        mediaElements.push(element);
                        this.videoElement = element;
                        break;
                    case "image":
                        element = this.addImageElement(item);
                        mediaLoading = true;
                        mediaElements.push(element);
                        break;
                    case "site":
                        element = this.addURLElement(item);
                        break;
                    case "table":
                        element = this.addTableElement(item);
                        break;
                }
                if (element) container.appendChild(element);
            }
            if (mediaLoading) {
                this.waitForMediaLoad(container, mediaElements);
            } else {
                this.transitionToNextSlide(container);
            }
        }

        waitForMediaLoad(container, mediaElements) {
            let loadedCount = 0;
            const totalElements = mediaElements.length;
            let transitioned = false;
            const doTransition = () => { if (transitioned) return; transitioned = true; this.transitionToNextSlide(container); };
            const checkAllLoaded = () => { if (loadedCount >= totalElements) doTransition(); };
            mediaElements.forEach(element => {
                if (element.tagName.toLowerCase() === 'img') {
                    if (element.complete) { loadedCount++; checkAllLoaded(); }
                    else {
                        element.onload = () => { loadedCount++; checkAllLoaded(); };
                        element.onerror = () => { loadedCount++; checkAllLoaded(); };
                    }
                } else if (element.tagName.toLowerCase() === 'video') {
                    if (element.readyState >= 3) { loadedCount++; checkAllLoaded(); }
                    else {
                        element.oncanplay = () => { loadedCount++; checkAllLoaded(); };
                        element.onerror = () => { loadedCount++; checkAllLoaded(); };
                    }
                }
            });
            setTimeout(() => { if (!transitioned) doTransition(); }, 15000);
        }

        transitionToNextSlide(nextContainer) {
            const currentContainer = document.getElementById("content-wrap");
            const oldVideo = this._lastVideoElement;
            if (oldVideo) {
                try { oldVideo.pause(); oldVideo.removeAttribute('src'); oldVideo.load(); } catch (e) {}
            }
            nextContainer.style.transition = "opacity 0.3s ease-in-out";
            nextContainer.style.opacity = "1";
            if (currentContainer) {
                currentContainer.style.transition = "opacity 0.3s ease-in-out";
                currentContainer.style.opacity = "0";
            }
            setTimeout(() => {
                if (currentContainer) currentContainer.remove();
                nextContainer.id = "content-wrap";
                const newVideo = this.videoElement;
                this._lastVideoElement = newVideo;
                if (newVideo) {
                    try { newVideo.currentTime = 0; } catch (e) {}
                    const p = newVideo.play();
                    if (p !== undefined) p.catch(err => { if (err.name !== 'AbortError') console.error("Video play error:", err); });
                }
                this.startPreciseTimer();
            }, 300);
        }

        startPreciseTimer() {
            this.slideStartTime = performance.now();
            this.isSlidePlaying = true;
            const checkTime = (timestamp) => {
                if (!this.isSlidePlaying) return;
                if (timestamp - this.slideStartTime >= this.slideDuration) {
                    this.isSlidePlaying = false;
                    this.goToNextSlide();
                } else {
                    this.animationFrameId = requestAnimationFrame(checkTime);
                }
            };
            this.animationFrameId = requestAnimationFrame(checkTime);
        }

        goToNextSlide() {
            this.currentSlide = (this.currentSlide === this.slidesCount) ? 1 : this.currentSlide + 1;
            this.showSlide(this.currentSlide);
        }

        addTextElement(element) {
            let el = document.createElement("div");
            el.style.position = "absolute";
            el.style.width = element.width + "px";
            el.style.backgroundColor = element.attr.frame_bg_color || "transparent";
            el.style.color = element.attr.color || "#000000";
            el.style.top = element.top + "px";
            el.style.left = element.left + "px";
            if (element.attr.font_size) el.style.fontSize = element.attr.font_size + "px";
            el.style.height = element.height + "px";
            el.style.overflow = "hidden";
            el.style.zIndex = element.index;
            if (element.attr.is_scrolling) {
                let m = document.createElement("marquee");
                m.direction = element.attr.direction;
                m.scrollAmount = element.attr.speed;
                let t = element.attr.textarea.replace("font - size", "font-size").replace(" px", "px");
                m.innerHTML = t;
                el.append(m);
            } else {
                let t = element.attr.textarea.replace("font - size", "font-size").replace(" px", "px");
                el.innerHTML = t;
            }
            return el;
        }

        addVideoElement(element) {
            let el = document.createElement("video");
            el.setAttribute("type", "video/mp4");
            el.setAttribute("controls", "false");
            el.setAttribute("playsinline", "");
            el.setAttribute("preload", "auto");
            if (element.attr.ismute) el.muted = true;
            el.style.position = "absolute";
            el.style.top = element.top + "px";
            el.style.left = element.left + "px";
            el.style.height = "100%";
            el.style.width = "100%";
            el.style.zIndex = element.index;
            el.src = element.attr.location;
            return el;
        }

        addImageElement(element) {
            let el = document.createElement("img");
            el.style.position = "absolute";
            el.style.top = element.top + "px";
            el.style.left = element.left + "px";
            el.style.height = "100%";
            el.style.width = "100%";
            el.style.zIndex = element.index;
            el.src = element.attr.location;
            return el;
        }

        addURLElement(element) {
            let el = document.createElement("iframe");
            el.style.position = "absolute";
            el.style.top = "0";
            el.style.left = "0";
            el.style.width = "100vw";
            el.style.height = "100vh";
            el.style.zIndex = element.index;
            el.src = element.attr.url;
            el.setAttribute("allowfullscreen", "true");
            el.setAttribute("allow", "autoplay; fullscreen; encrypted-media");
            return el;
        }

        addTableElement(item) {
            const div = document.createElement("div");
            const table = document.createElement("table");
            div.style.backgroundColor = item.attr.bg_color || "transparent";
            table.style.tableLayout = "fixed";
            const borderColor = item.attr.borderColor || "#ffa102";
            if (item.display_types && item.display_types.length) {
                const d = item.display_types[0];
                div.style.position = "absolute";
                div.style.top = d.top + "px";
                div.style.left = d.left + "px";
                div.style.width = d.width + "px";
                div.style.height = d.height + "px";
                div.style.zIndex = item.index || 1;
                table.style.width = "100%";
            }
            table.style.border = "1px solid " + borderColor;
            if (item.attr.columns && item.attr.columns.length) {
                const thead = document.createElement("thead");
                const headerRow = document.createElement("tr");
                const pct = (100 / item.attr.columns.length).toFixed(2) + "%";
                item.attr.columns.forEach(col => {
                    const th = document.createElement("th");
                    const p = document.createElement("p");
                    p.textContent = col.text;
                    th.style.border = "1px solid " + borderColor;
                    th.style.width = pct;
                    th.style.backgroundColor = col.attr.backgroundColor;
                    Object.assign(p.style, { color: col.attr.color, fontSize: col.attr.fontSize + "px", fontStyle: col.attr.fontStyle, textAlign: col.attr.textAlign });
                    th.appendChild(p); headerRow.appendChild(th);
                });
                thead.appendChild(headerRow); table.appendChild(thead);
            }
            if (item.attr.rows && item.attr.rows.length) {
                const tbody = document.createElement("tbody");
                item.attr.rows.forEach(row => {
                    const tr = document.createElement("tr");
                    row.forEach(cell => {
                        const td = document.createElement("td");
                        td.style.border = "1px solid " + borderColor;
                        td.style.backgroundColor = cell.attr.backgroundColor;
                        const p = document.createElement("p");
                        p.textContent = cell.text;
                        Object.assign(p.style, { color: cell.attr.color, fontSize: cell.attr.fontSize + "px", fontStyle: cell.attr.fontStyle, textAlign: cell.attr.textAlign });
                        td.appendChild(p); tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
                table.appendChild(tbody);
            }
            div.appendChild(table);
            return div;
        }
    }

    // ==================== APP LOGIC ====================
    let currentPlayer = null;
    let refreshInterval = null;
    let currentCredentials = null;
    let lastPlaylistJSON = null;
    const REFRESH_INTERVAL = 10000;
    const CRED_STORAGE_KEY = 'ds_player_credentials';

    function fixMediaUrls(slides, server) {
        slides.forEach(function(slide) {
            if (slide.items) {
                slide.items.forEach(function(item) {
                    if (item.attr && item.attr.location) {
                        if (item.attr.location.startsWith('/')) {
                            item.attr.location = server + item.attr.location;
                        } else if (!item.attr.location.startsWith('http')) {
                            item.attr.location = server + '/' + item.attr.location;
                        }
                    }
                    if (item.attr && item.attr.url) {
                        if (item.attr.url.startsWith('/')) {
                            item.attr.url = server + item.attr.url;
                        }
                    }
                });
            }
        });
    }

    async function fetchPlaylist(server, username, password) {
        const url = server + '/api/v1/playlist/';
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        if (!response.ok) {
            const errData = await response.json().catch(function() { return {}; });
            throw new Error(errData.error || 'HTTP ' + response.status);
        }
        return await response.json();
    }

    function startPlayer(playlistData) {
        if (currentPlayer) { currentPlayer.stopPlayer(); currentPlayer = null; }
        document.getElementById('content-wrap').innerHTML = '';
        currentPlayer = new Player(playlistData.slides);
        currentPlayer.startPlayer();
    }

    async function refreshPlaylist() {
        if (!currentCredentials) return;
        try {
            const data = await fetchPlaylist(currentCredentials.server, currentCredentials.username, currentCredentials.password);
            if (!data.slides || data.slides.length === 0) return;
            fixMediaUrls(data.slides, currentCredentials.server);
            const newJSON = JSON.stringify(data);
            if (newJSON !== lastPlaylistJSON) {
                console.log('[Refresh] Playlist changed! Restarting player...');
                lastPlaylistJSON = newJSON;
                startPlayer(data);
            }
            document.getElementById('offline-indicator').style.display = 'none';
        } catch (err) {
            console.warn('[Refresh] Error:', err.message);
            document.getElementById('offline-indicator').style.display = 'block';
        }
    }

    function saveCredentials(server, username, password) {
        try { localStorage.setItem(CRED_STORAGE_KEY, JSON.stringify({ server, username, password })); } catch (e) {}
    }

    function loadCredentials() {
        try { return JSON.parse(localStorage.getItem(CRED_STORAGE_KEY)); } catch (e) { return null; }
    }

    // Also support URL parameters: ?server=...&username=...&password=...
    function getUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const server = params.get('server');
        const username = params.get('username');
        const password = params.get('password');
        if (server && username && password) return { server, username, password };
        return null;
    }

    async function connectAndPlay() {
        const server = document.getElementById('server').value.trim().replace(/\/$/, '');
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorEl = document.getElementById('cred-error');
        const btn = document.getElementById('connect-btn');

        if (!server || !username || !password) {
            errorEl.textContent = 'Please fill all fields';
            errorEl.style.display = 'block';
            return;
        }

        errorEl.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Connecting...';
        document.getElementById('loading-overlay').style.display = 'flex';

        try {
            const playlistData = await fetchPlaylist(server, username, password);
            if (!playlistData.slides || playlistData.slides.length === 0) {
                throw new Error('No slides in this playlist. Make sure slides are published.');
            }
            fixMediaUrls(playlistData.slides, server);
            lastPlaylistJSON = JSON.stringify(playlistData);
            currentCredentials = { server, username, password };
            saveCredentials(server, username, password);

            document.getElementById('cred-page').style.display = 'none';
            document.getElementById('loading-overlay').style.display = 'none';
            startPlayer(playlistData);

            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(refreshPlaylist, REFRESH_INTERVAL);
        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.style.display = 'block';
            document.getElementById('loading-overlay').style.display = 'none';
        }
        btn.disabled = false;
        btn.textContent = 'Connect & Play';
    }

    async function autoConnect(creds) {
        document.getElementById('server').value = creds.server;
        document.getElementById('username').value = creds.username;
        document.getElementById('password').value = creds.password;
        await connectAndPlay();
    }

    // Allow Enter key to submit
    document.querySelectorAll('#cred-page input').forEach(function(input) {
        input.addEventListener('keydown', function(e) { if (e.key === 'Enter') connectAndPlay(); });
    });

    // Auto-connect on load if credentials available (URL params > localStorage)
    window.addEventListener('load', function() {
        const urlCreds = getUrlParams();
        if (urlCreds) {
            autoConnect(urlCreds);
        } else {
            const savedCreds = loadCredentials();
            if (savedCreds && savedCreds.server && savedCreds.username && savedCreds.password) {
                autoConnect(savedCreds);
            }
        }
    });
    </script>
</body>
</html>

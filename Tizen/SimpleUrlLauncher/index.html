<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        /* ── Settings screen ── */
        #settings {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 40px;
        }
        #settings h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #f8fafc;
        }
        #settings p.subtitle {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 48px;
        }
        .form-group {
            width: 100%;
            max-width: 700px;
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-group input {
            width: 100%;
            padding: 16px 20px;
            font-size: 22px;
            border: 2px solid #334155;
            border-radius: 12px;
            background: #1e293b;
            color: #f8fafc;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #3b82f6;
        }
        .btn-row {
            display: flex;
            gap: 16px;
            width: 100%;
            max-width: 700px;
            margin-top: 8px;
        }
        button {
            flex: 1;
            padding: 16px 32px;
            font-size: 22px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            outline: none;
        }
        button:focus {
            box-shadow: 0 0 0 3px rgba(59,130,246,0.5);
        }
        .btn-connect {
            background: #3b82f6;
            color: #fff;
        }
        .btn-connect:hover, .btn-connect:focus {
            background: #2563eb;
        }
        .btn-clear {
            background: #334155;
            color: #cbd5e1;
            flex: 0.4;
        }
        .btn-clear:hover, .btn-clear:focus {
            background: #475569;
        }
        .saved-urls {
            width: 100%;
            max-width: 700px;
            margin-top: 32px;
        }
        .saved-urls h3 {
            font-size: 16px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }
        .saved-url-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #1e293b;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s, background 0.2s;
        }
        .saved-url-item:hover, .saved-url-item:focus {
            border-color: #3b82f6;
            background: #253349;
        }
        .saved-url-item .url-text {
            flex: 1;
            font-size: 18px;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .saved-url-item .remove-btn {
            font-size: 14px;
            color: #ef4444;
            background: none;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            flex: 0;
            min-width: auto;
        }
        .status-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #64748b;
        }

        /* ── Fullscreen iframe ── */
        #viewer {
            display: none;
            width: 100%;
            height: 100%;
        }
        #viewer iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Settings screen -->
    <div id="settings">
        <h1>Digital Signage</h1>
        <p class="subtitle">Enter the URL to display on this screen</p>

        <div class="form-group">
            <label>URL</label>
            <input type="url" id="url-input" placeholder="https://example.com/open-link/display-name" autofocus />
        </div>

        <div class="btn-row">
            <button class="btn-connect" id="btn-connect" onclick="connect()">Connect</button>
            <button class="btn-clear" id="btn-clear" onclick="clearSaved()">Clear All</button>
        </div>

        <div class="saved-urls" id="saved-urls-section" style="display:none;">
            <h3>Recent URLs</h3>
            <div id="saved-urls-list"></div>
        </div>

        <div class="status-bar">Press <b>Back</b> on remote to return to this screen</div>
    </div>

    <!-- Fullscreen viewer -->
    <div id="viewer">
        <iframe id="ds-frame" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>

    <script>
        var STORAGE_KEY = 'ds_saved_urls';
        var LAST_URL_KEY = 'ds_last_url';

        function getSavedUrls() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch(e) { return []; }
        }

        function saveSavedUrls(urls) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(urls));
        }

        function addToSaved(url) {
            var urls = getSavedUrls();
            // Remove duplicate then prepend
            urls = urls.filter(function(u) { return u !== url; });
            urls.unshift(url);
            // Keep max 10
            if (urls.length > 10) urls = urls.slice(0, 10);
            saveSavedUrls(urls);
        }

        function renderSavedUrls() {
            var urls = getSavedUrls();
            var section = document.getElementById('saved-urls-section');
            var list = document.getElementById('saved-urls-list');
            if (!urls.length) {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block';
            list.innerHTML = '';
            urls.forEach(function(url, idx) {
                var item = document.createElement('div');
                item.className = 'saved-url-item';
                item.tabIndex = 0;
                item.innerHTML =
                    '<span class="url-text">' + url.replace(/</g, '&lt;') + '</span>' +
                    '<button class="remove-btn" data-idx="' + idx + '">✕</button>';
                item.addEventListener('click', function(e) {
                    if (e.target.classList.contains('remove-btn')) {
                        var urls2 = getSavedUrls();
                        urls2.splice(idx, 1);
                        saveSavedUrls(urls2);
                        renderSavedUrls();
                        return;
                    }
                    document.getElementById('url-input').value = url;
                    connect();
                });
                item.addEventListener('keydown', function(e) {
                    if (e.keyCode === 13) { // Enter
                        document.getElementById('url-input').value = url;
                        connect();
                    }
                });
                list.appendChild(item);
            });
        }

        function connect() {
            var url = document.getElementById('url-input').value.trim();
            if (!url) return;
            // Auto-prefix https if missing
            if (url.indexOf('http') !== 0) url = 'https://' + url;
            addToSaved(url);
            localStorage.setItem(LAST_URL_KEY, url);

            document.getElementById('settings').style.display = 'none';
            document.getElementById('viewer').style.display = 'block';
            document.getElementById('ds-frame').src = url;
        }

        function showSettings() {
            document.getElementById('ds-frame').src = '';
            document.getElementById('viewer').style.display = 'none';
            document.getElementById('settings').style.display = 'flex';
            renderSavedUrls();
            document.getElementById('url-input').focus();
        }

        function clearSaved() {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(LAST_URL_KEY);
            document.getElementById('url-input').value = '';
            renderSavedUrls();
        }

        // Register Tizen remote keys
        if (typeof tizen !== 'undefined') {
            try {
                tizen.tvinputdevice.registerKey("Exit");
                tizen.tvinputdevice.registerKey("Return");
            } catch(e) {}
        }

        document.addEventListener('keydown', function(e) {
            // Back / Return key → go back to settings
            if (e.keyCode === 10009) { // Exit
                if (document.getElementById('viewer').style.display === 'block') {
                    showSettings();
                } else {
                    if (typeof tizen !== 'undefined') {
                        tizen.application.getCurrentApplication().exit();
                    }
                }
            }
            if (e.keyCode === 10010 || e.keyCode === 8) { // Return / Backspace
                if (document.getElementById('viewer').style.display === 'block') {
                    e.preventDefault();
                    showSettings();
                }
            }
        });

        // Allow Enter in input to connect
        document.getElementById('url-input').addEventListener('keydown', function(e) {
            if (e.keyCode === 13) connect();
        });

        // On load: auto-connect if there's a saved URL
        (function() {
            renderSavedUrls();
            var lastUrl = localStorage.getItem(LAST_URL_KEY);
            if (lastUrl) {
                document.getElementById('url-input').value = lastUrl;
                connect();
            }
        })();
    </script>
</body>
</html>

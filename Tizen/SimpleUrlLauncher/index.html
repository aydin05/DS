<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Digital Signage</title>
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: Arial, sans-serif; }

        /* Settings screen */
        #settings {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; padding: 20px; background: #0f172a;
        }
        #settings .logo { margin-bottom: 32px; }
        #settings h1 { color: #f8fafc; font-size: 48px; margin-bottom: 16px; }
        #settings .subtitle { color: #94a3b8; font-size: 20px; margin-bottom: 40px; }
        #settings .form-wrap { width: 100%; max-width: 700px; }
        #url-input {
            width: 100%; padding: 16px; font-size: 22px;
            border: 2px solid #334155; border-radius: 12px;
            background: #1e293b; color: #f8fafc; outline: none; margin-bottom: 16px;
        }
        #btn-connect {
            padding: 16px 48px; font-size: 22px; font-weight: 600;
            border: none; border-radius: 12px; background: #3b82f6;
            color: #fff; cursor: pointer; outline: none;
        }
        #status { color: #94a3b8; font-size: 16px; margin-top: 24px; }

        /* Fullscreen video players (dual for seamless swap on Tizen 7) */
        #local-video-a, #local-video-b {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: contain;
            background: #000;
        }
        #local-video-a { z-index: 6; }
        #local-video-b { z-index: 5; }

        /* Red dot — offline indicator */
        #offline-dot {
            display: none; position: absolute; top: 16px; right: 16px;
            width: 16px; height: 16px; border-radius: 50%;
            background: #ef4444; z-index: 20;
            box-shadow: 0 0 6px 2px rgba(239, 68, 68, 0.6);
        }

        /* Hidden iframe for API polling (behind video) */
        #ds-frame {
            display: none; position: absolute; top: 0; left: 0;
            width: 1px; height: 1px; border: none; z-index: 0;
            opacity: 0; pointer-events: none;
        }

        /* Key capture overlay */
        #key-overlay {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 10; background: transparent;
        }
    </style>
</head>
<body>
    <!-- Settings screen -->
    <div id="settings">
        <div class="logo">
            <svg width="260" height="57" viewBox="0 0 200 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M60.543 29.8996C60.543 28.3664 61.7821 27.125 63.313 27.125C64.8462 27.125 66.0831 28.3641 66.0831 29.8996V43.7634H60.5519V29.8996H60.543Z" fill="#f8fafc"/>
                <path d="M77.1481 29.9196C77.1481 22.2671 70.9524 16.0625 63.3112 16.0625C55.6699 16.0625 49.4766 22.2671 49.4766 29.9196V43.7677H55.0077V29.9196C55.0077 25.3267 58.7251 21.6049 63.3112 21.6049C67.8973 21.6049 71.6147 25.3267 71.6147 29.9196V43.7677H77.1458L77.1481 29.9196Z" fill="#f8fafc"/>
                <path d="M96.6041 32.6819C95.0731 32.6819 93.834 31.4428 93.834 29.9074C93.834 28.3742 95.0731 27.1328 96.6041 27.1328H110.448V32.6752H96.6041V32.6819Z" fill="#f8fafc"/>

                <path d="M154.918 32.6663C153.388 32.6663 152.148 31.4249 152.148 29.8917C152.148 28.3586 153.388 27.1172 154.918 27.1172H168.762V32.6573L154.918 32.6663Z" fill="#f8fafc"/>
                <path d="M154.934 16.0469C147.293 16.0469 141.1 22.2515 141.1 29.9017C141.1 37.5542 147.293 43.7588 154.934 43.7588H168.76V38.2186H154.934C150.348 38.2186 146.633 34.4968 146.633 29.9039C146.633 25.3111 150.35 21.5893 154.934 21.5893H168.76V16.0469H154.934Z" fill="#f8fafc"/>
                <path d="M195.154 31.9243C197.471 34.5147 198.925 38.3758 198.894 43.7767H193.277C193.293 37.5048 191.176 34.0052 187.185 32.9501C186.406 32.7436 185.629 32.6808 184.837 32.6808H183.043L174.293 32.6538V27.1249L191.706 27.08C193.23 27.08 194.469 25.8835 194.469 24.3593C194.469 23.2504 193.816 22.2851 192.869 21.8474H192.86C192.505 21.6858 192.115 21.5915 191.706 21.5915H174.291V16.0469H191.782C196.324 16.0469 200.001 19.8069 200.001 24.3548C200.003 27.6996 198.018 30.6223 195.154 31.9243Z" fill="#f8fafc"/>
                <path d="M141.045 16.0469V21.587H129.98V43.7655H124.44V21.587H113.373V16.0469H141.045Z" fill="#f8fafc"/>
                <path d="M43.926 21.8822C43.926 27.1103 42.0853 31.9097 39.0166 35.6742L35.0344 31.6605C37.0906 28.9398 38.3073 25.5524 38.3073 21.8822C38.3073 12.8896 30.9893 5.60074 21.963 5.60074C12.9367 5.60074 5.6187 12.8896 5.6187 21.8822C5.6187 30.3944 12.1735 37.3802 20.5263 38.103L26.1495 43.7464C26.1495 43.7464 22.2705 43.7666 21.963 43.7666C9.83441 43.7666 0 33.9681 0 21.8822C0 9.7985 9.83441 0 21.963 0C34.0916 0 43.926 9.7985 43.926 21.8822Z" fill="#f8fafc"/>
                <path d="M40.0913 43.7468H33.1078L20.3125 30.8438H27.2871L27.3117 30.8684L40.0913 43.7468Z" fill="#f8fafc"/>
            </svg>
        </div>
        <h1>Digital Signage</h1>
        <p class="subtitle">Enter the URL to display on this screen</p>
        <div class="form-wrap" style="text-align:center;">
            <input id="url-input" type="text" placeholder="https://qmeterds.kapitalbank.az/newds/tv-player.html?username=" value="https://qmeterds.kapitalbank.az/newds/tv-player.html?username=" />
            <br/>
            <button id="btn-connect">Connect</button>
        </div>
        <p id="status">Press DOWN to select Connect, ENTER to activate. Press 0 to return to settings.</p>
    </div>

    <!-- Fullscreen local video players (dual for Tizen 7 seamless swap) -->
    <video id="local-video-a" autoplay muted playsinline></video>
    <video id="local-video-b" muted playsinline></video>

    <!-- Red dot for offline -->
    <div id="offline-dot"></div>

    <!-- Hidden iframe — only for API polling / heartbeat -->
    <iframe id="ds-frame" allowfullscreen="true" allow="autoplay; fullscreen; encrypted-media"></iframe>

    <!-- Transparent overlay to capture remote key events -->
    <div id="key-overlay" tabindex="0"></div>

    <script>
        var urlInput = document.getElementById('url-input');
        var btnConnect = document.getElementById('btn-connect');
        var statusEl = document.getElementById('status');
        var settingsEl = document.getElementById('settings');
        var dsFrame = document.getElementById('ds-frame');
        var vidA = document.getElementById('local-video-a');
        var vidB = document.getElementById('local-video-b');
        var offlineDot = document.getElementById('offline-dot');
        var keyOverlay = document.getElementById('key-overlay');

        var isPlaying = false;
        var currentRemoteUrl = null;   // URL from server (for change detection)
        var localVideoPath = null;     // Tizen filesystem path currently playing
        var isDownloading = false;
        var IS_TIZEN4 = (navigator.userAgent.indexOf('Tizen 4') !== -1);
        var LOCAL_DIR = 'wgt-private';  // persists across app restarts (NOT tmp!)
        var LOCAL_FILENAME = 'ds_video.mp4';

        // --- Dual-video state (Tizen 7 seamless swap) ---
        var activeVid = vidA;
        var standbyVid = vidB;

        // --- Tizen filesystem helpers ---
        function resolveLocalPath(cb) {
            try {
                tizen.filesystem.resolve(LOCAL_DIR, function(dir) {
                    cb(dir.toURI() + '/' + LOCAL_FILENAME);
                }, function(err) {
                    console.error('[FS] resolve error:', err.message);
                    cb(null);
                }, 'rw');
            } catch(e) {
                console.error('[FS] resolve exception:', e.message);
                cb(null);
            }
        }

        // Check if local video file exists (callback: true/false)
        function checkLocalFileExists(cb) {
            try {
                tizen.filesystem.resolve(LOCAL_DIR, function(dir) {
                    try {
                        var files = dir.listFiles();
                        for (var i = 0; i < files.length; i++) {
                            if (files[i].name === LOCAL_FILENAME) {
                                cb(true, dir.toURI() + '/' + LOCAL_FILENAME);
                                return;
                            }
                        }
                        cb(false, null);
                    } catch(e) {
                        cb(false, null);
                    }
                }, function() { cb(false, null); }, 'r');
            } catch(e) {
                cb(false, null);
            }
        }

        function downloadVideoToLocal(url, onDone) {
            if (isDownloading) return;
            isDownloading = true;
            console.log('[DL] Downloading:', url);

            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.responseType = 'arraybuffer';
            xhr.timeout = 300000; // 5 min for large files

            xhr.onload = function() {
                if (xhr.status === 200) {
                    writeToFilesystem(xhr.response, onDone);
                } else {
                    console.error('[DL] HTTP error:', xhr.status);
                    isDownloading = false;
                    onDone(null);
                }
            };
            xhr.onerror = function() {
                console.error('[DL] Network error');
                isDownloading = false;
                onDone(null);
            };
            xhr.ontimeout = function() {
                console.error('[DL] Timeout');
                isDownloading = false;
                onDone(null);
            };
            xhr.send();
        }

        function writeToFilesystem(arrayBuffer, onDone) {
            try {
                tizen.filesystem.resolve(LOCAL_DIR, function(dir) {
                    // Delete old file if exists
                    try { dir.deleteFile(dir.toURI() + '/' + LOCAL_FILENAME); } catch(e) {}

                    var file = dir.createFile(LOCAL_FILENAME);
                    var filePath = file.toURI();

                    file.openStream('w', function(stream) {
                        var bytes = new Uint8Array(arrayBuffer);
                        // Write in chunks — convert to plain array for Tizen 4 compat
                        var chunkSize = 1024 * 64; // 64KB chunks (safe for Tizen stream)
                        for (var i = 0; i < bytes.length; i += chunkSize) {
                            var end = Math.min(i + chunkSize, bytes.length);
                            var chunk = Array.prototype.slice.call(bytes.subarray(i, end));
                            stream.writeBytes(chunk);
                        }
                        stream.close();
                        console.log('[FS] Video saved, size:', bytes.length, 'path:', filePath);
                        isDownloading = false;
                        onDone(filePath);
                    }, function(err) {
                        console.error('[FS] writeStream error:', err.message);
                        isDownloading = false;
                        onDone(null);
                    }, 'UTF-8');
                }, function(err) {
                    console.error('[FS] resolve error:', err.message);
                    isDownloading = false;
                    onDone(null);
                }, 'rw');
            } catch(e) {
                console.error('[FS] exception:', e.message);
                isDownloading = false;
                onDone(null);
            }
        }

        // --- Play video from local file ---
        function playLocalVideo(filePath) {
            if (!filePath) return;
            localVideoPath = filePath;
            localStorage.setItem('ds_local_video_path', filePath);

            activeVid.style.display = 'block';
            if (activeVid.src !== filePath) {
                activeVid.src = filePath;
                activeVid.load();
            }
            try { activeVid.play(); } catch(e) {}

            // Tizen 7+: preload standby element for seamless swap
            if (!IS_TIZEN4) {
                preloadStandby(filePath);
            }
        }

        // Preload the standby video element so it's ready to swap instantly
        function preloadStandby(filePath) {
            if (!filePath) return;
            standbyVid.src = filePath;
            standbyVid.load();
            // Keep hidden but decoded — ready to show
            standbyVid.style.display = 'block';
            standbyVid.style.visibility = 'hidden';
        }

        // Swap active ↔ standby (Tizen 7 seamless transition)
        function swapVideos() {
            var tmp = activeVid;
            activeVid = standbyVid;
            standbyVid = tmp;

            // Show new active on top, hide old
            activeVid.style.zIndex = 6;
            activeVid.style.visibility = 'visible';
            standbyVid.style.zIndex = 5;

            try { activeVid.play(); } catch(e) {}

            // After swap is visible, preload standby for next loop
            setTimeout(function() {
                standbyVid.style.visibility = 'hidden';
                if (localVideoPath) {
                    preloadStandby(localVideoPath);
                }
            }, 200);
        }

        // --- ended handler ---
        function onVideoEnded() {
            console.log('[Video] ended, tizen4=' + IS_TIZEN4);
            if (IS_TIZEN4) {
                // Tizen 4: single decoder, just reload
                this.load();
                try { this.play(); } catch(e) {}
            } else {
                // Tizen 7+: seamless swap to preloaded standby
                swapVideos();
            }
        }
        vidA.addEventListener('ended', onVideoEnded);
        vidB.addEventListener('ended', onVideoEnded);

        // --- error handler ---
        function onVideoError() {
            var err = this.error ? this.error.message || this.error.code : 'unknown';
            console.error('[Video] error:', err, 'src:', this.src);
            currentRemoteUrl = null;
            localStorage.removeItem('ds_remote_video_url');
            var self = this;
            setTimeout(function() {
                if (localVideoPath) {
                    checkLocalFileExists(function(exists, path) {
                        if (exists) {
                            console.log('[Video] File exists, retrying playback');
                            self.src = path;
                            self.load();
                            try { self.play(); } catch(e) {}
                        } else {
                            console.warn('[Video] Local file missing, waiting for re-download');
                            localVideoPath = null;
                            localStorage.removeItem('ds_local_video_path');
                        }
                    });
                }
            }, 3000);
        }
        vidA.addEventListener('error', onVideoError);
        vidB.addEventListener('error', onVideoError);

        // Stall detection (monitors active video)
        var _lastTime = -1, _stallCount = 0;
        setInterval(function() {
            if (!activeVid.src || !activeVid.duration || activeVid.error) return;
            if (activeVid.currentTime === _lastTime && activeVid.currentTime > 0) {
                _stallCount++;
                if (_stallCount >= 3) {
                    console.log('[Video] stall detected, restarting');
                    activeVid.load();
                    try { activeVid.play(); } catch(e) {}
                    _stallCount = 0;
                    _lastTime = -1;
                }
            } else { _stallCount = 0; }
            _lastTime = activeVid.currentTime;
        }, 1000);

        // --- Listen for messages from iframe (tv-player.html?mode=tizen) ---
        window.addEventListener('message', function(e) {
            if (!e.data || !e.data.type) return;

            if (e.data.type === 'ds-video-url') {
                var remoteUrl = e.data.url;
                console.log('[MSG] Video URL from iframe:', remoteUrl);
                if (remoteUrl && remoteUrl !== currentRemoteUrl) {
                    currentRemoteUrl = remoteUrl;
                    localStorage.setItem('ds_remote_video_url', remoteUrl);
                    // Download new video to local filesystem
                    downloadVideoToLocal(remoteUrl, function(filePath) {
                        if (filePath) {
                            playLocalVideo(filePath);
                        }
                    });
                }
            }

            if (e.data.type === 'ds-connectivity') {
                offlineDot.style.display = e.data.online ? 'none' : 'block';
            }
        });

        // --- Register Samsung remote keys ---
        try {
            if (typeof tizen !== 'undefined' && tizen.tvinputdevice) {
                var keys = ["0","1","2","3","Exit","Return"];
                for (var k = 0; k < keys.length; k++) {
                    try { tizen.tvinputdevice.registerKey(keys[k]); } catch(e) {}
                }
            }
        } catch(e) {}

        // --- Connect: load iframe + start local video ---
        function doConnect() {
            try {
                var url = urlInput.value.trim();
                if (!url) return;
                if (url.indexOf('http') !== 0) url = 'http://' + url;

                // Ensure mode=tizen is in the URL so iframe sends video URLs via postMessage
                if (url.indexOf('mode=') === -1) {
                    url += (url.indexOf('?') === -1 ? '?' : '&') + 'mode=tizen';
                }

                statusEl.innerText = 'Loading: ' + url;
                localStorage.setItem('ds_last_url', url);
                settingsEl.style.display = 'none';
                dsFrame.style.display = 'block';
                dsFrame.src = url;
                keyOverlay.style.display = 'block';
                keyOverlay.focus();
                isPlaying = true;

                // If we have a previously saved local video, verify it exists then play
                var savedPath = localStorage.getItem('ds_local_video_path');
                if (savedPath) {
                    checkLocalFileExists(function(exists, verifiedPath) {
                        if (exists) {
                            console.log('[Boot] Local video verified, playing:', verifiedPath);
                            playLocalVideo(verifiedPath);
                            // Restore remote URL for change detection
                            var savedRemote = localStorage.getItem('ds_remote_video_url');
                            if (savedRemote) currentRemoteUrl = savedRemote;
                        } else {
                            console.warn('[Boot] Local video MISSING — clearing saved state, will re-download');
                            localStorage.removeItem('ds_local_video_path');
                            localStorage.removeItem('ds_remote_video_url');
                            currentRemoteUrl = null;
                        }
                    });
                }
            } catch(e) {
                statusEl.innerText = 'Error: ' + e.message;
            }
        }

        // --- Return to settings ---
        function showSettings() {
            isPlaying = false;
            dsFrame.src = 'about:blank';
            dsFrame.style.display = 'none';
            vidA.pause(); vidA.src = ''; vidA.style.display = 'none';
            vidB.pause(); vidB.src = ''; vidB.style.display = 'none';
            activeVid = vidA; standbyVid = vidB;
            offlineDot.style.display = 'none';
            keyOverlay.style.display = 'none';
            settingsEl.style.display = 'flex';
            localStorage.removeItem('ds_last_url');
            focusedElement = 'input';
            highlightInput(true);
            highlightButton(false);
            urlInput.focus();
            statusEl.innerText = 'Disconnected. Enter a URL and press Connect.';
        }

        // --- Focus highlight helpers ---
        function highlightButton(on) {
            btnConnect.style.background = on ? '#2563eb' : '#3b82f6';
            btnConnect.style.boxShadow = on ? '0 0 0 3px #60a5fa' : 'none';
        }
        function highlightInput(on) {
            urlInput.style.borderColor = on ? '#60a5fa' : '#334155';
            urlInput.style.boxShadow = on ? '0 0 0 3px rgba(96,165,250,0.3)' : 'none';
        }

        // --- D-pad / remote navigation ---
        var focusedElement = 'input';

        document.addEventListener('keydown', function(e) {
            var key = e.keyCode;

            // "0" on Samsung remote = keyCode 48 → back to settings
            if (key === 48) {
                e.preventDefault();
                if (isPlaying) { showSettings(); }
                return;
            }

            // EXIT key (Samsung remote)
            if (key === 10009) {
                if (isPlaying) { showSettings(); }
                else { try { tizen.application.getCurrentApplication().exit(); } catch(ex) {} }
                return;
            }

            // RETURN / BACK key
            if (key === 10010 || key === 8) {
                if (isPlaying) { e.preventDefault(); showSettings(); }
                return;
            }

            // Settings screen navigation
            if (!isPlaying) {
                if (key === 40 && focusedElement === 'input') {
                    e.preventDefault();
                    focusedElement = 'button';
                    btnConnect.focus();
                    highlightInput(false);
                    highlightButton(true);
                    statusEl.innerText = 'Press ENTER to connect';
                    return;
                }
                if (key === 38 && focusedElement === 'button') {
                    e.preventDefault();
                    focusedElement = 'input';
                    urlInput.focus();
                    highlightButton(false);
                    highlightInput(true);
                    statusEl.innerText = 'Press DOWN to select Connect';
                    return;
                }
                if (key === 13) {
                    e.preventDefault();
                    doConnect();
                    return;
                }
            }
        });

        // Keep overlay focused so remote keys always reach us
        setInterval(function() {
            if (isPlaying && keyOverlay) {
                try { keyOverlay.focus(); } catch(e) {}
            }
        }, 500);

        // --- Initial state ---
        highlightInput(true);
        urlInput.focus();

        // --- Auto-connect if URL was previously saved (survives TV power off) ---
        try {
            var lastUrl = localStorage.getItem('ds_last_url');
            if (lastUrl) {
                urlInput.value = lastUrl;
                doConnect();
            }
        } catch(e) {}

    </script>
</body>
</html>

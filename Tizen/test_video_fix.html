<!DOCTYPE html>
<html>
<head>
    <title>Test Video Transition Fix</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #main-wrap { position: relative; width: 1280px; height: 720px; margin: 0 auto; background: #111; }
        #content-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace; font-size: 12px; padding: 10px; max-height: 200px; overflow-y: auto; z-index: 9999; }
        #controls { position: fixed; top: 10px; right: 10px; z-index: 9999; }
        #controls button { padding: 8px 16px; margin: 4px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div id="main-wrap">
        <div id="content-wrap"></div>
    </div>
    <div id="controls">
        <button onclick="startTest()">Start Playlist (2 videos)</button>
        <button onclick="player && player.stopPlayer()">Stop</button>
    </div>
    <div id="status"></div>

    <script>
        // Mock Logger
        const Logger = {
            info: (msg, data) => log('INFO', msg, data),
            warn: (msg, data) => log('WARN', msg, data),
            error: (msg, data) => log('ERROR', msg, data),
        };
        function log(level, msg, data) {
            const el = document.getElementById('status');
            const time = new Date().toLocaleTimeString();
            el.innerHTML += `<div>[${time}] ${level}: ${msg} ${data ? JSON.stringify(data) : ''}</div>`;
            el.scrollTop = el.scrollHeight;
            console.log(`[${level}] ${msg}`, data || '');
        }
    </script>

    <!-- Load the FIXED slider.js -->
    <script src="DigitalSignatureApp/js/slider.js"></script>

    <script>
        var player;

        function startTest() {
            document.getElementById('status').innerHTML = '';
            // Use two sample public domain videos
            const testSlides = [
                {
                    duration: 6,
                    items: [{
                        type_content: "video",
                        type: "video",
                        top: 0, left: 0, width: 1280, height: 720, index: 1,
                        attr: {
                            location: "https://www.w3schools.com/html/mov_bbb.mp4",
                            ismute: true
                        }
                    }]
                },
                {
                    duration: 6,
                    items: [{
                        type_content: "video",
                        type: "video",
                        top: 0, left: 0, width: 1280, height: 720, index: 1,
                        attr: {
                            location: "https://www.w3schools.com/html/movie.mp4",
                            ismute: true
                        }
                    }]
                }
            ];

            if (player) player.stopPlayer();
            player = new Player(testSlides);
            player.startPlayer();
            log('INFO', 'Test started - should cycle between 2 videos every 6 seconds');
        }
    </script>
</body>
</html>

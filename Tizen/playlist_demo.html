<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Digital Signature - Playlist Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: -apple-system, sans-serif; color: #fff; overflow: hidden; }

        /* Credential Page */
        #cred-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f1117, #1a1d2e);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .cred-box {
            background: #1c1f2e; border: 1px solid #2d3148; border-radius: 16px;
            padding: 50px; width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .cred-box h2 { text-align: center; margin-bottom: 8px; font-size: 22px; }
        .cred-box p { text-align: center; color: #8b8fa3; font-size: 13px; margin-bottom: 30px; }
        .cred-box label { display: block; font-size: 12px; color: #8b8fa3; margin-bottom: 6px; margin-top: 16px; }
        .cred-box input {
            width: 100%; padding: 12px 14px; background: #252838; border: 1px solid #2d3148;
            border-radius: 8px; color: #e1e4e8; font-size: 14px; outline: none;
        }
        .cred-box input:focus { border-color: #4f8cff; }
        .cred-box button {
            width: 100%; padding: 14px; margin-top: 24px;
            background: linear-gradient(135deg, #4f8cff, #6c5ce7); border: none;
            border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
        }
        .cred-box button:disabled { opacity: 0.5; }
        #cred-error { color: #ff4757; font-size: 13px; margin-top: 12px; display: none; }

        /* Player Area */
        #player-wrap {
            position: relative; width: 100vw; height: 100vh; background: #000;
        }
        #content-wrap {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 500;
        }
        .loader { width: 40px; height: 40px; border: 3px solid #2d3148; border-top-color: #4f8cff;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading_text { color: #8b8fa3; font-size: 14px; }

        /* Info Bar */
        #info-bar {
            position: fixed; top: 10px; right: 10px; z-index: 600;
            background: rgba(28,31,46,0.9); border: 1px solid #2d3148; border-radius: 10px;
            padding: 10px 16px; font-size: 12px; color: #8b8fa3; display: none;
        }
        #info-bar .playlist-name { color: #4f8cff; font-weight: 600; }
        #info-bar .slide-info { margin-top: 4px; }
        #info-bar button {
            margin-top: 8px; padding: 4px 12px; background: #252838; border: 1px solid #2d3148;
            border-radius: 6px; color: #e1e4e8; font-size: 11px; cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Credential Page -->
    <div id="cred-page">
        <div class="cred-box">
            <h2>Digital Signature Player</h2>
            <p>Enter display credentials to load a real playlist</p>
            <label>Server URL</label>
            <input type="text" id="server" value="https://aydin.technolink.az" placeholder="http://your-server">
            <label>Display Username</label>
            <input type="text" id="username" placeholder="Display username">
            <label>Display Password</label>
            <input type="password" id="password" placeholder="Display password">
            <button id="connect-btn" onclick="connectAndPlay()">Connect & Play</button>
            <div id="cred-error"></div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loader"></div>
        <div id="loading_text">Connecting to server...</div>
    </div>

    <!-- Player -->
    <div id="player-wrap">
        <div id="content-wrap"></div>
    </div>

    <!-- Info Bar -->
    <div id="info-bar">
        <div>Playlist: <span class="playlist-name" id="playlist-name">-</span></div>
        <div class="slide-info" id="slide-info">Slides: 0</div>
        <button onclick="showCredentials()">Change Display</button>
    </div>

    <!-- Logger Mock -->
    <script>
        const Logger = {
            info: function(msg, data) { console.log('[INFO]', msg, data || ''); },
            warn: function(msg, data) { console.warn('[WARN]', msg, data || ''); },
            error: function(msg, data) { console.error('[ERROR]', msg, data || ''); },
        };
    </script>

    <!-- Load the FIXED slider.js Player -->
    <script src="DigitalSignatureApp/js/slider.js"></script>

    <script>
        let currentPlayer = null;
        let refreshInterval = null;
        let currentCredentials = null;
        let lastPlaylistJSON = null;
        const REFRESH_INTERVAL = 10000; // 10 seconds, same as Tizen app

        function fixMediaUrls(slides, server) {
            slides.forEach(function(slide) {
                if (slide.items) {
                    slide.items.forEach(function(item) {
                        if (item.attr && item.attr.location) {
                            if (item.attr.location.startsWith('/')) {
                                item.attr.location = server + item.attr.location;
                            } else if (!item.attr.location.startsWith('http')) {
                                item.attr.location = server + '/' + item.attr.location;
                            }
                        }
                        if (item.attr && item.attr.url) {
                            if (item.attr.url.startsWith('/')) {
                                item.attr.url = server + item.attr.url;
                            }
                        }
                    });
                }
            });
        }

        async function fetchPlaylist(server, username, password) {
            const url = server + '/api/v1/playlist/';
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if (!response.ok) {
                const errData = await response.json().catch(function() { return {}; });
                throw new Error(errData.error || 'HTTP ' + response.status);
            }
            return await response.json();
        }

        function startPlayer(playlistData) {
            if (currentPlayer) {
                currentPlayer.stopPlayer();
                currentPlayer = null;
            }
            document.getElementById('content-wrap').innerHTML = '';
            currentPlayer = new Player(playlistData.slides);
            currentPlayer.startPlayer();
        }

        function updateInfoBar(playlistData, username) {
            document.getElementById('info-bar').style.display = 'block';
            document.getElementById('playlist-name').textContent =
                (playlistData.general && playlistData.general.name) || 'Unknown';
            document.getElementById('slide-info').textContent =
                'Slides: ' + playlistData.slides.length + ' | Display: ' + username +
                ' | Auto-refresh: ' + (REFRESH_INTERVAL / 1000) + 's';
        }

        // Auto-refresh: re-fetch playlist and update if changed
        async function refreshPlaylist() {
            if (!currentCredentials) return;
            try {
                const data = await fetchPlaylist(
                    currentCredentials.server,
                    currentCredentials.username,
                    currentCredentials.password
                );

                if (!data.slides || data.slides.length === 0) {
                    console.log('[Refresh] Playlist has no slides');
                    return;
                }

                fixMediaUrls(data.slides, currentCredentials.server);
                const newJSON = JSON.stringify(data);

                if (newJSON !== lastPlaylistJSON) {
                    console.log('[Refresh] Playlist changed! Restarting player...');
                    lastPlaylistJSON = newJSON;
                    updateInfoBar(data, currentCredentials.username);
                    startPlayer(data);
                } else {
                    console.log('[Refresh] No changes detected');
                }
            } catch (err) {
                console.warn('[Refresh] Error fetching playlist:', err.message);
            }
        }

        async function connectAndPlay() {
            const server = document.getElementById('server').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('cred-error');
            const btn = document.getElementById('connect-btn');

            if (!server || !username || !password) {
                errorEl.textContent = 'Please fill all fields';
                errorEl.style.display = 'block';
                return;
            }

            errorEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Connecting...';

            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading_text').textContent = 'Fetching playlist from server...';

            try {
                const playlistData = await fetchPlaylist(server, username, password);
                console.log('Playlist data:', playlistData);

                if (!playlistData.slides || playlistData.slides.length === 0) {
                    throw new Error('No slides in this playlist. Make sure slides are published.');
                }

                fixMediaUrls(playlistData.slides, server);
                lastPlaylistJSON = JSON.stringify(playlistData);

                // Save credentials for auto-refresh
                currentCredentials = { server, username, password };

                // Hide cred page, show player
                document.getElementById('cred-page').style.display = 'none';
                document.getElementById('loading-overlay').style.display = 'none';

                updateInfoBar(playlistData, username);
                startPlayer(playlistData);

                // Start auto-refresh interval
                if (refreshInterval) clearInterval(refreshInterval);
                refreshInterval = setInterval(refreshPlaylist, REFRESH_INTERVAL);

            } catch (err) {
                console.error('Error:', err);
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                document.getElementById('loading-overlay').style.display = 'none';
            }

            btn.disabled = false;
            btn.textContent = 'Connect & Play';
        }

        function showCredentials() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
            if (currentPlayer) {
                currentPlayer.stopPlayer();
                currentPlayer = null;
            }
            currentCredentials = null;
            lastPlaylistJSON = null;
            document.getElementById('content-wrap').innerHTML = '';
            document.getElementById('cred-page').style.display = 'flex';
            document.getElementById('info-bar').style.display = 'none';
        }

        // Allow Enter key to submit
        document.querySelectorAll('#cred-page input').forEach(function(input) {
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') connectAndPlay();
            });
        });
    </script>
</body>
</html>
